{% extends 'layout.html' %}
{% block content %}
<section class="form-page">
  <div class="container">
    <div class="form-card">
      <h2 class="section-title section-title--center">Book a Table</h2>
      <div class="section-underline section-underline--center"></div>
      <form method="post">
        <div class="form-row">
          <div class="form-field"><label>Name</label><input name="name" required></div>
          <div class="form-field"><label>Email</label><input name="email" type="email" required></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Phone</label><input name="phone"></div>
          <div class="form-field"><label>Guests</label><input name="guests" type="number" value="1" min="1"></div>
        </div>
        <div class="form-row">
          <div class="form-field"><label>Date</label><input name="reserve_date" type="date" required></div>
          <div class="form-field"><label>Time</label><input name="reserve_time" type="time" required></div>
        </div>
        <button type="submit" class="btn btn--gold">Book Table</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
