{% extends 'layout.html' %}
{% block content %}
<section class="form-page">
  <div class="container">
    <div class="form-card">
      <h2 class="section-title section-title--center">Login</h2>
      <div class="section-underline section-underline--center"></div>
      <form method="post">
        <div class="form-field"><label>Email</label><input name="email" type="email" required></div>
        <div class="form-field"><label>Password</label><input name="password" type="password" required></div>
        <button type="submit" class="btn btn--gold">Login</button>
      </form>
      <p style="margin-top:20px;text-align:center">
        <a href="{{ url_for('main.register') }}" class="nav__link" style="color:var(--color-gold)">Create an account</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
